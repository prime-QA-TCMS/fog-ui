name: PR NPM Tests
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-npm-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  npm-test:
    name: npm test - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      
    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test
